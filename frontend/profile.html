<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LastMinute AI - My Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #f5f7fc 0%, #eef2f9 100%); min-height: 100vh; }
        .glass-card { background: rgba(255,255,255,0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.5); border-radius: 1rem; }
        .profile-avatar { transition: all 0.2s ease; cursor: pointer; display: inline-block; margin: 0 0.25rem; }
        .profile-avatar.selected img { border: 3px solid #6366f1; transform: scale(1.05); }
        .profile-avatar img { transition: all 0.2s ease; width: 80px; height: 80px; border-radius: 50%; cursor: pointer; object-fit: cover; }
        .profile-avatar:hover img { transform: scale(1.05); }
    </style>
</head>
<body>

<div class="max-w-4xl mx-auto px-4 py-8">
    <!-- Header -->
    <div class="mb-6">
        <div class="flex items-center gap-3 mb-4">
            <div class="bg-gradient-to-br from-indigo-600 to-purple-600 p-2.5 rounded-2xl shadow-lg">
                <i class="fas fa-user-circle text-white text-2xl"></i>
            </div>
            <h1 class="text-3xl font-extrabold bg-gradient-to-r from-indigo-700 via-purple-700 to-pink-600 bg-clip-text text-transparent">My Account</h1>
        </div>
        <p class="text-gray-500 text-sm">Manage your profile information and preferences</p>
    </div>

    <!-- Account Card -->
    <div class="glass-card p-6 md:p-8">
        <!-- Profile Photo Section -->
        <div class="mb-8">
            <label class="block font-semibold text-gray-700 mb-4 text-lg">Profile Photo</label>
            <div class="flex flex-wrap gap-4 justify-center md:justify-start" id="avatarContainer">
                <div class="profile-avatar" data-avatar="1">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Student1&backgroundColor=b6e3f4&eyes=happy&mouth=smile" alt="Avatar 1">
                </div>
                <div class="profile-avatar" data-avatar="2">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Student2&backgroundColor=ffd5dc&eyes=variant01&mouth=smile" alt="Avatar 2">
                </div>
                <div class="profile-avatar" data-avatar="3">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Student3&backgroundColor=c0e0c0&eyes=variant02&mouth=twinkle" alt="Avatar 3">
                </div>
                <div class="profile-avatar" data-avatar="4">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Student4&backgroundColor=f5e6d3&eyes=variant03&mouth=smile" alt="Avatar 4">
                </div>
                <div class="profile-avatar" data-avatar="5">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Student5&backgroundColor=d4e6f1&eyes=side&mouth=surprised" alt="Avatar 5">
                </div>
                <div class="profile-avatar" data-avatar="6">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Student6&backgroundColor=f9e79f&eyes=variant04&mouth=smile" alt="Avatar 6">
                </div>
            </div>
            <p class="text-xs text-gray-400 mt-3 text-center md:text-left">Click on any avatar to select your profile picture</p>
        </div>

        <!-- Personal Information Form -->
        <div class="border-t border-gray-200 pt-6">
            <h3 class="font-semibold text-gray-800 mb-4 text-lg">Personal Information</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div>
                    <label class="block font-medium text-gray-700 mb-2">Full Name</label>
                    <input type="text" id="fullName" placeholder="Enter your full name" class="w-full px-4 py-2.5 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-300 focus:border-indigo-300 transition">
                </div>
                <div>
                    <label class="block font-medium text-gray-700 mb-2">Birth Date</label>
                    <input type="date" id="birthDate" class="w-full px-4 py-2.5 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-300 focus:border-indigo-300 transition">
                </div>
                <div>
                    <label class="block font-medium text-gray-700 mb-2">Grade / Class</label>
                    <select id="grade" class="w-full px-4 py-2.5 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-300 focus:border-indigo-300 transition">
                        <option value="">Select your grade</option>
                        <option value="6th Grade">6th Grade</option>
                        <option value="7th Grade">7th Grade</option>
                        <option value="8th Grade">8th Grade</option>
                        <option value="9th Grade">9th Grade</option>
                        <option value="10th Grade">10th Grade</option>
                        <option value="11th Grade">11th Grade</option>
                        <option value="12th Grade">12th Grade</option>
                        <option value="Undergraduate">Undergraduate</option>
                        <option value="Graduate">Graduate</option>
                    </select>
                </div>
                <div>
                    <label class="block font-medium text-gray-700 mb-2">Login ID</label>
                    <input type="text" id="loginIdDisplay" readonly placeholder="Not logged in" class="w-full px-4 py-2.5 rounded-xl border border-gray-200 bg-gray-50 text-gray-600">
                </div>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="mt-8 flex flex-wrap gap-4">
            <button id="saveAccountBtn" class="bg-gradient-to-r from-indigo-600 to-purple-600 text-white px-6 py-2.5 rounded-xl font-semibold hover:shadow-lg transition transform hover:scale-[1.02]">
                <i class="fas fa-save"></i> Save Changes
            </button>
            <button id="resetAccountBtn" class="bg-gray-200 text-gray-700 px-6 py-2.5 rounded-xl font-semibold hover:bg-gray-300 transition">
                <i class="fas fa-undo"></i> Reset
            </button>
        </div>

        <!-- Success Message -->
        <div id="saveMsg" class="mt-4 text-sm text-green-600 hidden"></div>
    </div>

    <!-- Back Link -->
    <div class="mt-6 text-center">
        <a href="dashboard.html" class="text-indigo-600 hover:text-indigo-800 text-sm">
            <i class="fas fa-arrow-left"></i> Back to Dashboard
        </a>
    </div>
</div>

<script>
// Profile Data
let currentUser = null;
let userProfile = { avatar: '1', name: '', birthDate: '', grade: '' };

// Load user from localStorage
function loadUser() {
    let savedUser = localStorage.getItem('currentUser');
    if (savedUser) {
        currentUser = JSON.parse(savedUser);
        document.getElementById('loginIdDisplay').value = currentUser.value;
    }
    
    // Load profile data
    let savedProfile = localStorage.getItem('userProfile');
    if (savedProfile) {
        userProfile = JSON.parse(savedProfile);
    } else {
        // Try to load from the old format (lm_*)
        if (currentUser) {
            let oldProfile = localStorage.getItem(`lm_${currentUser.value}`);
            if (oldProfile) {
                let data = JSON.parse(oldProfile);
                if (data.userProfile) {
                    userProfile = data.userProfile;
                }
            }
        }
    }
    loadProfileForm();
}

function loadProfileForm() {
    document.getElementById('fullName').value = userProfile.name || '';
    document.getElementById('birthDate').value = userProfile.birthDate || '';
    document.getElementById('grade').value = userProfile.grade || '';
    
    // Highlight selected avatar
    document.querySelectorAll('.profile-avatar').forEach(av => {
        av.classList.remove('selected');
        if (av.dataset.avatar === userProfile.avatar) {
            av.classList.add('selected');
        }
    });
}

function saveProfile() {
    userProfile.name = document.getElementById('fullName').value;
    userProfile.birthDate = document.getElementById('birthDate').value;
    userProfile.grade = document.getElementById('grade').value;
    
    // Save to localStorage
    localStorage.setItem('userProfile', JSON.stringify(userProfile));
    
    // Also save to user-specific storage if logged in
    if (currentUser) {
        let key = `lm_${currentUser.value}`;
        let existing = localStorage.getItem(key);
        if (existing) {
            let data = JSON.parse(existing);
            data.userProfile = userProfile;
            localStorage.setItem(key, JSON.stringify(data));
        }
    }
    
    // Show success message
    let msg = document.getElementById('saveMsg');
    msg.innerHTML = '<i class="fas fa-check-circle"></i> Profile saved successfully!';
    msg.classList.remove('hidden');
    setTimeout(() => {
        msg.classList.add('hidden');
    }, 3000);
}

function resetProfile() {
    userProfile = { avatar: '1', name: '', birthDate: '', grade: '' };
    loadProfileForm();
    localStorage.setItem('userProfile', JSON.stringify(userProfile));
    
    // Also update user-specific storage
    if (currentUser) {
        let key = `lm_${currentUser.value}`;
        let existing = localStorage.getItem(key);
        if (existing) {
            let data = JSON.parse(existing);
            data.userProfile = userProfile;
            localStorage.setItem(key, JSON.stringify(data));
        }
    }
    
    let msg = document.getElementById('saveMsg');
    msg.innerHTML = '<i class="fas fa-undo"></i> Profile has been reset';
    msg.classList.remove('hidden');
    setTimeout(() => {
        msg.classList.add('hidden');
    }, 2000);
}

// Avatar selection
document.querySelectorAll('.profile-avatar').forEach(av => {
    av.onclick = () => {
        userProfile.avatar = av.dataset.avatar;
        loadProfileForm();
        localStorage.setItem('userProfile', JSON.stringify(userProfile));
        
        // Update user-specific storage
        if (currentUser) {
            let key = `lm_${currentUser.value}`;
            let existing = localStorage.getItem(key);
            if (existing) {
                let data = JSON.parse(existing);
                data.userProfile = userProfile;
                localStorage.setItem(key, JSON.stringify(data));
            }
        }
        
        // Show temporary selection feedback
        let msg = document.getElementById('saveMsg');
        msg.innerHTML = '<i class="fas fa-check-circle"></i> Avatar updated!';
        msg.classList.remove('hidden');
        setTimeout(() => {
            msg.classList.add('hidden');
        }, 1500);
    };
});

// Button handlers
document.getElementById('saveAccountBtn').onclick = saveProfile;
document.getElementById('resetAccountBtn').onclick = resetProfile;

// Check if user is logged in, if not redirect to login
function checkAuth() {
    let user = localStorage.getItem('currentUser');
    if (!user) {
        // Redirect to login page if not logged in (optional)
        // window.location.href = 'login.html';
        document.getElementById('loginIdDisplay').value = 'Not logged in';
    }
}

// Initialize
loadUser();
checkAuth();
</script>

</body>
</html>
